spring.application.name=${APP_NAME:my-tasks-backend}

# ===============================
# DATABASE CONFIG
# ===============================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}

spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# ===============================
# CORS
# ===============================

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===============================
# TIMEZONE
# ===============================

spring.jpa.properties.hibernate.jdbc.time_zone=${DB_TIMEZONE:UTC}

# ===============================
# Config Auth WSC
# ===============================

wsc.auth.jwt.secret=${JWT_SECRET}
wsc.auth.jwt.accessTokenExpiration=${JWT_ACCESS_EXP}
wsc.auth.jwt.refreshTokenExpiration=${JWT_REFRESH_EXP}

# ===============================
# E-mail config
# ===============================

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true